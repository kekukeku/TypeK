name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            stable_name: TypeK
            dmg_glob: "*.dmg"
            upload_sourcemaps: "true"
            arch: "aarch64"
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            stable_name: TypeK
            dmg_glob: "*.dmg"
            upload_sourcemaps: "false"
            arch: "x64"
          - platform: windows-latest
            args: ""
            rust_target: ""
            stable_name: TypeK
            dmg_glob: ""
            upload_sourcemaps: "false"
            arch: "x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          RAW_TAG="${RAW_TAG#refs/tags/}"
          RELEASE_VERSION="${RAW_TAG#v}"

          echo "RELEASE_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "SENTRY_RELEASE=typek@$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "VITE_SENTRY_RELEASE=typek@$RELEASE_VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          VITE_SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          VITE_SENTRY_RELEASE: ${{ env.VITE_SENTRY_RELEASE }}
          VITE_SENTRY_SOURCEMAPS_ENABLED: ${{ matrix.upload_sourcemaps }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "TypeK v${{ env.RELEASE_VERSION }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload frontend sourcemaps to Sentry
        if: matrix.upload_sourcemaps == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        shell: bash
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN}" ] || [ -z "${SENTRY_ORG}" ] || [ -z "${SENTRY_PROJECT}" ]; then
            echo "Sentry sourcemap upload skipped: missing Sentry release secrets."
            exit 0
          fi

          npx @sentry/cli releases new "$SENTRY_RELEASE" || true
          npx @sentry/cli sourcemaps upload dist/assets \
            --release "$SENTRY_RELEASE" \
            --url-prefix "~/assets" \
            --validate \
            --wait
          npx @sentry/cli releases finalize "$SENTRY_RELEASE" || true

      - name: Upload stable-name asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            STABLE_NAME="${{ matrix.stable_name }}_${RELEASE_VERSION}_${{ matrix.arch }}.dmg"
            cp "$DMG" "$STABLE_NAME"
            gh release upload "$RELEASE_TAG" "$STABLE_NAME" --clobber
          fi

      - name: Upload stable-name asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "*-setup.exe" | Select-Object -First 1
          $StableName = "${{ matrix.stable_name }}_${env:RELEASE_VERSION}_x64.exe"
          Copy-Item $exe.FullName "$StableName"
          gh release upload "$env:RELEASE_TAG" "$StableName" --clobber

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          RAW_TAG="${RAW_TAG#refs/tags/}"
          echo "RELEASE_TAG=$RAW_TAG" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
